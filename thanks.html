<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You | Jay's KickAsh BBQ</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Page-only styles so it looks right even if style.css doesn't update immediately -->
  <style>
    .thank-you-wrapper{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #000;
    }
    .thank-you-card{
      background: #111;
      border: 2px solid #ff3b30;
      border-radius: 12px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      text-align: left;
      box-shadow: 0 0 18px rgba(255, 59, 48, 0.25);
    }
    .thank-you-top{
      display: flex;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }
    .thank-you-logo{
      width: 120px;
      height: auto;
      border-radius: 8px;
    }
    .thank-you-card h1{
      margin: 0;
      color: #fff;
      font-size: 2rem;
      line-height: 1.2;
    }
    .thank-you-card p{
      margin-top: 10px;
      color: #ddd;
    }
    .thank-you-actions{
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .thank-you-actions a.btn-primary{
      text-decoration: none;
    }
    @media (max-width: 600px){
      .thank-you-top{
        flex-direction: column;
        align-items: flex-start;
      }
      .thank-you-card{
        padding: 28px;
      }
      .thank-you-card h1{
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<body>
  <section class="thank-you-wrapper">
    <div class="thank-you-card">

      <div class="thank-you-top">
        <img src="logo.png" alt="Jay's KickAsh BBQ Logo" class="thank-you-logo" />
        <h1>🔥 Thanks for Reaching Out! 🔥</h1>
      </div>

      <p>
        Your catering request has been received. Jay will review your details and get back to you within 24 hours.
      </p>

      <p>
        Need something sooner? Call us directly at
        <a href="tel:15804910286">(580) 491-0286</a>
      </p>

      <div class="thank-you-actions">
        <a href="/" class="btn-primary">Back to Home</a>
      </div>

    </div>
  </section>
</body>
</html>
